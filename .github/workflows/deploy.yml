name: Deploy to GitHub Pages

# Build and deploy on every push to main, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; skip queued runs in favour of the latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Builds with Astro. The Pages action sets the correct `base` automatically
      # via `withastro/action`, so project pages (user.github.io/repo) just work.
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
